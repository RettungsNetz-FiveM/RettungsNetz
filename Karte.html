<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lagekarte — RettungsNetz</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090d;--sf:#0c1018;--sf2:#111620;
  --bd:#1a2235;--bd2:#212d40;
  --red:#e63946;--blu:#4895ef;--amb:#f4a261;--grn:#52b788;--ylw:#ffd166;
  --txt:#c8d4e8;--txt2:#7a8da8;--dim:#4a5c78;
  --mono:'Share Tech Mono',monospace;--cond:'Barlow Condensed',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--cond);overflow:hidden}

.shell{display:flex;height:100vh}
.sidebar{width:260px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;z-index:100}
.map-wrap{flex:1;position:relative;overflow:hidden;cursor:grab;user-select:none}
.map-wrap:active{cursor:grabbing}

/* ── Sidebar ── */
.sb-header{padding:16px 16px 12px;border-bottom:1px solid var(--bd)}
.sb-title{font-family:var(--mono);font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:4px}
.sb-brand{font-size:20px;font-weight:700;color:var(--txt);letter-spacing:1px;line-height:1}
.sb-brand span{color:var(--red)}
.sb-sec{padding:12px 14px;border-bottom:1px solid var(--bd)}
.sb-lbl{font-family:var(--mono);font-size:8px;letter-spacing:2.5px;color:var(--dim);text-transform:uppercase;margin-bottom:8px}

/* Layer toggles */
.layer-row{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer}
.layer-row:hover .layer-name{color:var(--txt)}
.layer-check{width:14px;height:14px;border:1px solid var(--bd2);background:var(--sf2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s}
.layer-check.on{background:var(--red);border-color:var(--red)}
.layer-check svg{display:none}
.layer-check.on svg{display:block}
.layer-name{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--txt2);text-transform:uppercase;transition:color .1s}

/* Search */
.search-wrap{position:relative}
.search-wrap input{
  width:100%;background:var(--sf2);border:1px solid var(--bd);
  padding:8px 10px 8px 30px;font-family:var(--mono);font-size:12px;
  color:var(--txt);outline:none;transition:border-color .15s;letter-spacing:.5px
}
.search-wrap input:focus{border-color:var(--red)}
.search-wrap input::placeholder{color:var(--dim)}
.si-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none}
#search-results{margin-top:5px;display:flex;flex-direction:column;gap:2px;max-height:180px;overflow-y:auto}
.sr-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid transparent;cursor:pointer;transition:all .1s}
.sr-item:hover,.sr-focused{background:var(--sf2);border-color:var(--bd)}
.sr-plz{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--red);min-width:48px}
.sr-empty{font-family:var(--mono);font-size:9px;color:var(--dim);text-align:center;padding:10px 0;letter-spacing:1px;text-transform:uppercase}


/* Status */
.statusbar{display:flex;border-top:1px solid var(--bd);background:var(--sf);flex-shrink:0}
.sb-stat{flex:1;padding:6px 10px;border-right:1px solid var(--bd)}
.sb-stat:last-child{border-right:none}
.sb-stat-lbl{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase}
.sb-stat-val{font-family:var(--mono);font-size:11px;color:var(--txt);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Map ── */
#map-viewport{width:100%;height:100%;position:relative;overflow:hidden}
/* SVG-Wrap hat eine feste Pixelgröße und wird per CSS translate+scale bewegt.
   Dadurch rendert der Browser SVG-Rasterinhalte (Map Tiles) in echter Pixelauflösung
   statt auf die CSS-Elementgröße zu skalieren — kein Unschärfe-Problem mehr. */
#map-svg-wrap{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#map-svg-wrap svg{display:block;overflow:visible}
#map-svg-wrap image{
  /* Browser dazu bringen, Rasterbilder moeglichst knackig statt weich zu samplen. */
  image-rendering:high-quality;
  image-rendering:-webkit-optimize-contrast;
  image-rendering:crisp-edges;
}
#map-svg-wrap g[id="Postal-Codes"],
#map-svg-wrap g[id="Highway-Shortcuts"]{
  shape-rendering:geometricPrecision;
  text-rendering:geometricPrecision;
}
#map-raster{
  display:block;
  width:100%;
  height:100%;
  image-rendering:auto;
}

/* Highlight */
.plz-highlight{
  position:absolute;pointer-events:none;z-index:30;
  border:3px solid var(--red);border-radius:3px;
  box-shadow:0 0 0 1px rgba(230,57,70,.2),0 0 12px rgba(230,57,70,.6),0 0 35px rgba(230,57,70,.25);
  animation:hlPop .5s ease-out forwards
}
@keyframes hlPop{
  0%{opacity:0;box-shadow:0 0 0 8px rgba(230,57,70,.4),0 0 30px rgba(230,57,70,.6)}
  100%{opacity:1;box-shadow:0 0 0 1px rgba(230,57,70,.2),0 0 12px rgba(230,57,70,.6),0 0 35px rgba(230,57,70,.25)}
}


/* Controls */
.zoom-ctrl{position:absolute;top:14px;right:14px;z-index:20;display:flex;flex-direction:column;gap:2px}
.zoom-btn{
  width:32px;height:32px;background:var(--sf);border:1px solid var(--bd2);
  color:var(--txt);font-family:var(--mono);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .1s;line-height:1
}
.zoom-btn:hover{background:var(--sf2)}
</style>
</head>
<body>
<div class="shell">

  <div class="sidebar">
    <div class="sb-header">
      <div class="sb-title">Lagekarte</div>
      <div class="sb-brand">Rettungs<span>Netz</span></div>
    </div>

    <div class="sb-sec">
      <div class="sb-lbl">Layer</div>
      <div class="layer-row" onclick="toggleLayer('Map-Tiles')" id="lay-Map-Tiles">
        <div class="layer-check on" id="chk-Map-Tiles"><svg width="10" height="10" viewBox="0 0 10 10"><polyline points="2,5 4,7 8,3" stroke="white" stroke-width="1.5" fill="none"/></svg></div>
        <span class="layer-name">Map Tiles</span>
      </div>
      <div class="layer-row" onclick="toggleLayer('Postal-Codes')" id="lay-Postal-Codes">
        <div class="layer-check on" id="chk-Postal-Codes"><svg width="10" height="10" viewBox="0 0 10 10"><polyline points="2,5 4,7 8,3" stroke="white" stroke-width="1.5" fill="none"/></svg></div>
        <span class="layer-name">Postal Codes</span>
      </div>
      <div class="layer-row" onclick="toggleLayer('Highway-Shortcuts')" id="lay-Highway-Shortcuts">
        <div class="layer-check on" id="chk-Highway-Shortcuts"><svg width="10" height="10" viewBox="0 0 10 10"><polyline points="2,5 4,7 8,3" stroke="white" stroke-width="1.5" fill="none"/></svg></div>
        <span class="layer-name">Highway Shortcuts</span>
      </div>
    </div>


    <div class="sb-sec">
      <div class="sb-lbl">Postzahl suchen</div>
      <div class="search-wrap">
        <svg class="si-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="z.B. 1378 …" autocomplete="off"
          oninput="onSearch(this.value)" onkeydown="onSearchKey(event)">
      </div>
      <div id="search-results"></div>
    </div>



    <div class="statusbar">
      <div class="sb-stat"><div class="sb-stat-lbl">Zoom</div><div class="sb-stat-val" id="stat-zoom">—</div></div>
      <div class="sb-stat"><div class="sb-stat-lbl">Aktiv</div><div class="sb-stat-val" id="stat-active">—</div></div>
    </div>
  </div>

  <div class="map-wrap" id="map-viewport">
    <div id="map-raster-wrap">
      <img id="map-raster" src="images/FiveM_Map_Blank.png" alt="">
    </div>
    <div id="map-svg-wrap"></div>
    <div id="plz-highlight" style="display:none"></div>
    <div class="zoom-ctrl">
      <button class="zoom-btn" onclick="zoomBy(1.25)">+</button>
      <button class="zoom-btn" onclick="zoomBy(0.8)">−</button>
      <button class="zoom-btn" style="font-size:11px" onclick="resetView()">⌂</button>
    </div>
  </div>

</div>

// ═══════════════════════════════════════════════════════
//  PAN & ZOOM — physische SVG-Größe + CSS translate
//
//  Warum nicht CSS scale()?
//  CSS scale() rendert das SVG intern auf die Basis-CSS-Größe
//  und skaliert das fertige Bitmap hoch → Rasterbilder (Tiles) unscharf.
//
//  Warum nicht viewBox-Manipulation?
//  viewBox komprimiert den Inhalt auf die CSS-Elementgröße →
//  Tiles werden auf kleine Fläche gerendert, dann hochgezogen → unscharf.
//
//  Richtige Lösung: SVG width/height = SVG_W*scale × SVG_H*scale.
//  Der Browser rendert dann jedes Tile in der echten Pixel-Auflösung.
//  Position per CSS translate(tx, ty) — kein scale() nötig.
//  svgToScreen: screen_x = tx + svg_x * scale  → Overlays stimmen exakt.
// ═══════════════════════════════════════════════════════
const viewport=document.getElementById('map-viewport');
const wrap=document.getElementById('map-svg-wrap');

let tx=0,ty=0,scale=1;
let svgEl=null;
let isDragging=false,dragStart={x:0,y:0};
const rasterWrap=document.getElementById('map-raster-wrap');
const rasterImg=document.getElementById('map-raster');

function applyTransform(){
  const pxW=Math.round(SVG_W*scale);
  const pxH=Math.round(SVG_H*scale);

  if(svgEl){
    svgEl.setAttribute('width', pxW);
    svgEl.setAttribute('height', pxH);
  }

  rasterWrap.style.width=pxW+'px';
  rasterWrap.style.height=pxH+'px';
  rasterWrap.style.transform=`translate(${tx}px,${ty}px)`;

  wrap.style.transform=`translate(${tx}px,${ty}px)`;

  document.getElementById('stat-zoom').textContent=Math.round(scale*100)+'%';
  updateOverlays();
}


// SVG-Koordinate → Pixel relativ zu #map-viewport
function svgToScreen(sx,sy){
  return{x:tx+sx*scale, y:ty+sy*scale};
}

// Bildschirm-Pixel → SVG-Koordinate
function screenToSVG(px,py){
  const r=viewport.getBoundingClientRect();
  return{x:(px-r.left-tx)/scale, y:(py-r.top-ty)/scale};
}

function zoomAround(svgCX,svgCY,factor){
  const newScale=Math.min(20,Math.max(0.05,scale*factor));
  tx=tx+(svgCX*scale-svgCX*newScale);
  ty=ty+(svgCY*scale-svgCY*newScale);
  scale=newScale;
  clamp();applyTransform();
}

function clamp(){
  const vw=viewport.clientWidth,vh=viewport.clientHeight;
  const margin=200;
  tx=Math.max(-(SVG_W*scale-margin),Math.min(vw-margin,tx));
  ty=Math.max(-(SVG_H*scale-margin),Math.min(vh-margin,ty));
}

function panTo(sx,sy,newZoom){
  const vw=viewport.clientWidth,vh=viewport.clientHeight;
  if(newZoom!==undefined)scale=newZoom;
  tx=vw/2-sx*scale;
  ty=vh/2-sy*scale;
  clamp();applyTransform();
}

function resetView(){
  const vw=viewport.clientWidth,vh=viewport.clientHeight;
  scale=Math.min(vw/SVG_W,vh/SVG_H);
  tx=(vw-SVG_W*scale)/2;
  ty=(vh-SVG_H*scale)/2;
  applyTransform();hideHL();
}

function zoomBy(f){
  zoomAround((-tx+viewport.clientWidth/2)/scale,(-ty+viewport.clientHeight/2)/scale,f);
}

// Drag
viewport.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  isDragging=true;dragStart={x:e.clientX-tx,y:e.clientY-ty};
  viewport.style.cursor='grabbing';
});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  tx=e.clientX-dragStart.x;ty=e.clientY-dragStart.y;
  clamp();applyTransform();
});
window.addEventListener('mouseup',()=>{isDragging=false;viewport.style.cursor=''});

// Wheel
viewport.addEventListener('wheel',e=>{
  e.preventDefault();
  const p=screenToSVG(e.clientX,e.clientY);
  zoomAround(p.x,p.y,e.deltaY<0?1.15:1/1.15);
},{passive:false});

// Touch
let lastDist=null;
viewport.addEventListener('touchstart',e=>{
  if(e.touches.length===1){
    isDragging=true;dragStart={x:e.touches[0].clientX-tx,y:e.touches[0].clientY-ty};
  }else if(e.touches.length===2){
    isDragging=false;
    lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:true});
viewport.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&isDragging){
    tx=e.touches[0].clientX-dragStart.x;ty=e.touches[0].clientY-dragStart.y;
    clamp();applyTransform();
  }else if(e.touches.length===2){
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2;
    const p=screenToSVG(mx,my);
    zoomAround(p.x,p.y,dist/lastDist);
    lastDist=dist;
  }
},{passive:false});
viewport.addEventListener('touchend',()=>{isDragging=false;lastDist=null});

// ═══════════════════════════════════════════════════════
//  LAYER TOGGLES
// ═══════════════════════════════════════════════════════
const layerState={};
function toggleLayer(id){
  if(!svgEl)return;
  const el=svgEl.getElementById(id);
  if(!el)return;
  layerState[id]=!layerState[id];
  el.style.display=layerState[id]?'none':'';
  const chk=document.getElementById('chk-'+id);
  if(chk)chk.classList.toggle('on',!layerState[id]);
}

// ═══════════════════════════════════════════════════════
//  HIGHLIGHT
// ═══════════════════════════════════════════════════════
const hlEl=document.getElementById('plz-highlight');
let hlSVG=null;

function showHL(sx,sy){
  hlSVG=[sx,sy];
  const pos=svgToScreen(sx,sy);
  // Box-Größe in SVG-Pixeln, dann mit scale multiplizieren → immer gleich groß auf Bildschirm
  const bw=12*scale, bh=5*scale;
  hlEl.className='plz-highlight';
  hlEl.style.cssText=`display:block;left:${pos.x}px;top:${pos.y}px;width:${bw}px;height:${bh}px;transform:translate(-15%,-80%)`;
}
function hideHL(){
  hlEl.style.display='none';hlSVG=null;
  document.getElementById('stat-active').textContent='—';
}
function updateHL(){
  if(!hlSVG)return;
  const pos=svgToScreen(hlSVG[0],hlSVG[1]);
  const bw=12*scale, bh=5*scale;
  hlEl.style.left=pos.x+'px';hlEl.style.top=pos.y+'px';
  hlEl.style.width=bw+'px';hlEl.style.height=bh+'px';
  hlEl.style.transform=`translate(-15%,-80%)`;
}

function jumpToPlz(plz){
  const c=PLZ_COORDS[plz];
  if(!c)return;
  document.getElementById('stat-active').textContent='PLZ '+plz;
  panTo(c[0],c[1],Math.max(scale,4));
  setTimeout(()=>showHL(c[0],c[1]),50);
}

// ═══════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════
let focusIdx=-1;

function onSearch(val){
  const q=val.trim();
  const box=document.getElementById('search-results');
  if(!q){box.innerHTML='';hideHL();return}
  const hits=Object.keys(PLZ_COORDS).filter(p=>p.startsWith(q)||p.includes(q)).slice(0,10);
  if(!hits.length){box.innerHTML='<div class="sr-empty">Keine Treffer</div>';return}
  box.innerHTML=hits.map(p=>`<div class="sr-item" onclick="sel('${p}')" data-plz="${p}">
    <span class="sr-plz">${p}</span></div>`).join('');
  focusIdx=-1;
}
function sel(plz){
  document.getElementById('search-input').value=plz;
  document.getElementById('search-results').innerHTML='';
  jumpToPlz(plz);
}
function onSearchKey(e){
  const items=[...document.querySelectorAll('.sr-item')];
  if(e.key==='ArrowDown'){e.preventDefault();focusIdx=Math.min(focusIdx+1,items.length-1);setF(items)}
  else if(e.key==='ArrowUp'){e.preventDefault();focusIdx=Math.max(focusIdx-1,0);setF(items)}
  else if(e.key==='Enter'){
    e.preventDefault();
    if(items[focusIdx])items[focusIdx].click();
    else if(items.length===1)items[0].click();
    else{const v=document.getElementById('search-input').value.trim();if(PLZ_COORDS[v])sel(v)}
  }
  else if(e.key==='Escape'){
    document.getElementById('search-results').innerHTML='';
    document.getElementById('search-input').value='';
    hideHL();focusIdx=-1;
  }
}
function setF(items){
  items.forEach((el,i)=>el.classList.toggle('sr-focused',i===focusIdx));
  if(items[focusIdx])items[focusIdx].scrollIntoView({block:'nearest'});
}

// ═══════════════════════════════════════════════════════
//  MARKERS
// ═══════════════════════════════════════════════════════
function updateOverlays(){
  updateHL();
}

function optimizeSvgRendering(){
  if(!svgEl)return;

  const mapTiles=svgEl.getElementById('Map-Tiles');
  if(mapTiles){
    mapTiles.style.imageRendering='-webkit-optimize-contrast';
    mapTiles.querySelectorAll('image').forEach(img=>{
      img.style.imageRendering='-webkit-optimize-contrast';
    });
  }

  const postalCodes=svgEl.getElementById('Postal-Codes');
  if(postalCodes){
    postalCodes.style.shapeRendering='geometricPrecision';
    postalCodes.style.textRendering='geometricPrecision';
  }

  const highwayShortcuts=svgEl.getElementById('Highway-Shortcuts');
  if(highwayShortcuts){
    highwayShortcuts.style.shapeRendering='geometricPrecision';
    highwayShortcuts.style.textRendering='geometricPrecision';
    highwayShortcuts.querySelectorAll('path, line, polyline, polygon').forEach(el=>{
      el.style.shapeRendering='geometricPrecision';
      el.style.vectorEffect='non-scaling-stroke';
    });
  }
}



// ═══════════════════════════════════════════════════════
//  SVG LADEN
// ═══════════════════════════════════════════════════════
async function loadSVG(){
  try{
    const res=await fetch(SVG_FILE);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    let svg=await res.text();
    // width/height entfernen — applyTransform() setzt sie dynamisch
    // auf SVG_W*scale × SVG_H*scale, damit Tiles immer scharf gerendert werden
    svg=svg.replace(/(<svg[^>]*)\s+width="[^"]*"/,'$1');
    svg=svg.replace(/(<svg[^>]*)\s+height="[^"]*"/,'$1');
    wrap.innerHTML=svg;
    svgEl=wrap.querySelector('svg');
    optimizeSvgRendering();
  }catch(err){
    wrap.innerHTML=`<div style="color:#e63946;font-family:monospace;padding:40px;font-size:13px;line-height:1.8">
      ⚠ ${err.message}<br><br>Lege <strong>${SVG_FILE}</strong> in denselben Ordner wie diese Datei.</div>`;
  }
  resetView();
}
loadSVG();
