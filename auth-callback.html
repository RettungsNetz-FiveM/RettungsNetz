<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RettungsNetz · Anmeldung</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b10; --sf: #0d1117; --bd: #1e2a3a;
  --red: #e63946; --grn: #52b788; --txt: #cdd6e8;
  --txt2: #8a9ab5; --white: #f0f4fa;
  --mono: 'Share Tech Mono', monospace;
  --cond: 'Barlow Condensed', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--txt);
  font-family: var(--mono);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
.box {
  text-align: center; padding: 48px 40px;
  border: 1px solid var(--bd); background: var(--sf);
  border-top: 3px solid var(--grn); max-width: 420px; width: 90%;
}
.logo {
  font-family: var(--cond); font-size: 28px; font-weight: 800;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--white); margin-bottom: 24px;
}
.logo em { color: var(--red); font-style: normal; }
.status {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--grn); margin-bottom: 12px;
}
.msg { font-size: 13px; color: var(--txt2); line-height: 1.6; }
.spinner {
  width: 32px; height: 32px; border: 2px solid var(--bd);
  border-top-color: var(--grn); border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 20px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.err { color: var(--red); }
</style>
</head>
<body>
<div class="box">
  <div class="logo">Rettungs<em>Netz</em></div>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Verarbeite Anmeldung…</div>
  <div class="msg" id="msg">Bitte warten, du wirst gleich weitergeleitet.</div>
</div>

<script type="module">
import { RN_CONFIG } from './auth-config.js';
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithCustomToken }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app  = initializeApp(RN_CONFIG.firebase);
const db   = getFirestore(app);
const auth = getAuth(app);

const setStatus = (s, m, err=false) => {
  document.getElementById('status').textContent = s;
  document.getElementById('msg').textContent    = m;
  if (err) {
    document.getElementById('msg').className = 'msg err';
    document.getElementById('spinner').style.display = 'none';
  }
};

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const state  = params.get('state');
  const error  = params.get('error');

  if (error) {
    setStatus('Abgebrochen', 'Die Discord-Anmeldung wurde abgebrochen.', true);
    setTimeout(() => window.location.href = 'index.html', 3000);
    return;
  }

  if (!code) {
    setStatus('Fehler', 'Kein Authorization Code erhalten.', true);
    return;
  }

  // Verify state against stored state
  const savedState = sessionStorage.getItem('discord_oauth_state');
  if (state !== savedState) {
    setStatus('Sicherheitsfehler', 'OAuth State stimmt nicht überein.', true);
    return;
  }

  try {
    setStatus('Discord verbinden…', 'Hole Zugriffstoken von Discord…');

    // Exchange code for token via Discord
    // NOTE: For GitHub Pages (no backend), we use Discord's implicit flow
    // The token exchange happens client-side using a CORS proxy or Firebase Function
    // For now, store code and redirect to setup where user can complete profile
    
    // Store auth code temporarily
    sessionStorage.setItem('discord_code', code);
    sessionStorage.removeItem('discord_oauth_state');

    setStatus('Erfolgreich!', 'Du wirst zum Profil-Setup weitergeleitet…');
    setTimeout(() => window.location.href = 'auth-setup.html', 1500);

  } catch (e) {
    console.error(e);
    setStatus('Fehler', 'Anmeldung fehlgeschlagen: ' + e.message, true);
  }
}

handleCallback();
</script>
</body>
</html>
